name: Production Deploy and Verify

on:
  workflow_dispatch:
    inputs:
      deploy_web:
        description: Deploy main and Admin Vercel production apps.
        required: true
        default: true
        type: boolean
      deploy_backend:
        description: Deploy Railway production backend.
        required: true
        default: true
        type: boolean
      run_release_gate:
        description: Run full production release gate after deployment.
        required: true
        default: true
        type: boolean
      deploy_message:
        description: Optional deployment message.
        required: false
        type: string

concurrency:
  group: production-deploy-and-verify
  cancel-in-progress: false

jobs:
  preflight:
    name: Release Preflight
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm --prefix backend ci

      - name: Check core docs
        run: npm run docs:check

      - name: Build and lint backend
        run: |
          npm --prefix backend run build
          npm --prefix backend run lint

  deploy-web:
    name: Deploy Vercel Production Web
    needs: preflight
    if: ${{ inputs.deploy_web }}
    runs-on: ubuntu-latest
    environment: Production
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
      VERCEL_MAIN_PROJECT_ID: ${{ vars.VERCEL_MAIN_PROJECT_ID }}
      VERCEL_ADMIN_PROJECT_ID: ${{ vars.VERCEL_ADMIN_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Validate Vercel deployment secrets
        run: |
          missing=0
          for key in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_MAIN_PROJECT_ID VERCEL_ADMIN_PROJECT_ID; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: ${key}"
              missing=1
            fi
          done
          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

      - name: Deploy main web to Vercel production
        working-directory: frontend
        env:
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_MAIN_PROJECT_ID }}
        run: |
          vercel pull --yes --environment=production --token="${VERCEL_TOKEN}"
          node ../scripts/import-vercel-public-env.mjs .vercel/.env.production.local
          test -f .env.production.local
          grep -q '^VITE_API_BASE_URL=' .env.production.local
          cd ..
          npm run contracts:build
          npm run api-client:build
          npm run build --workspace frontend
          node scripts/create-vercel-static-output.mjs frontend
          rm -rf .vercel/output
          mkdir -p .vercel
          cp -R frontend/.vercel/output .vercel/output
          vercel deploy --prebuilt --prod --token="${VERCEL_TOKEN}" --archive=tgz

      - name: Deploy Admin web to Vercel production
        working-directory: frontend-admin
        env:
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_ADMIN_PROJECT_ID }}
        run: |
          vercel pull --yes --environment=production --token="${VERCEL_TOKEN}"
          node ../scripts/import-vercel-public-env.mjs .vercel/.env.production.local
          test -f .env.production.local
          grep -q '^VITE_API_BASE_URL=' .env.production.local
          cd ..
          npm run contracts:build
          npm run api-client:build
          npm run build --workspace frontend-admin
          node scripts/create-vercel-static-output.mjs frontend-admin
          rm -rf .vercel/output
          mkdir -p .vercel
          cp -R frontend-admin/.vercel/output .vercel/output
          vercel deploy --prebuilt --prod --token="${VERCEL_TOKEN}" --archive=tgz

  deploy-backend:
    name: Deploy Railway Production Backend
    needs: preflight
    if: ${{ inputs.deploy_backend }}
    runs-on: ubuntu-latest
    environment: Production
    env:
      RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
      LEGACY_RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ vars.PRODUCTION_RAILWAY_PROJECT_ID || secrets.PRODUCTION_RAILWAY_PROJECT_ID || secrets.STAGING_RAILWAY_PROJECT_ID }}
      PRODUCTION_RAILWAY_ENVIRONMENT: production
      PRODUCTION_RAILWAY_SERVICE: ${{ vars.PRODUCTION_RAILWAY_SERVICE || 'mother-bear-court' }}
      DEPLOY_MESSAGE: ${{ inputs.deploy_message }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Validate Railway deployment secrets
        run: |
          missing=0
          if [ -z "${RAILWAY_API_TOKEN}" ] && [ -z "${LEGACY_RAILWAY_TOKEN}" ]; then
            echo "Missing required secret: RAILWAY_API_TOKEN (or legacy RAILWAY_TOKEN)"
            missing=1
          fi
          for key in RAILWAY_PROJECT_ID PRODUCTION_RAILWAY_SERVICE; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: ${key}"
              missing=1
            fi
          done
          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

      - name: Normalize Railway auth env
        run: |
          if [ -n "${RAILWAY_API_TOKEN}" ]; then
            echo "Using RAILWAY_API_TOKEN for Railway CLI auth."
          elif [ -n "${LEGACY_RAILWAY_TOKEN}" ]; then
            echo "RAILWAY_API_TOKEN=${LEGACY_RAILWAY_TOKEN}" >> "$GITHUB_ENV"
            echo "RAILWAY_TOKEN=${LEGACY_RAILWAY_TOKEN}" >> "$GITHUB_ENV"
          fi

      - name: Probe Railway auth
        run: |
          railway whoami
          railway project list

      - name: Capture previous production deployment
        id: previous
        run: |
          previous_deployment_id="$(
            railway status --json | jq -r \
              '.environments.edges[]
              | select(.node.name=="production")
              | .node.serviceInstances.edges[]
              | select(.node.serviceName=="mother-bear-court")
              | (.node.latestDeployment.id // "")'
          )"
          echo "value=${previous_deployment_id}" >> "$GITHUB_OUTPUT"

      - name: Resolve deploy message
        id: deploy_message
        run: |
          if [ -n "${DEPLOY_MESSAGE}" ]; then
            message="${DEPLOY_MESSAGE}"
          else
            message="github production deploy ${GITHUB_SHA}"
          fi
          echo "value=${message}" >> "$GITHUB_OUTPUT"

      - name: Stamp Railway production commit
        run: |
          railway variable set "EMORAPY_COMMIT_SHA=${GITHUB_SHA}" --skip-deploys -e "${PRODUCTION_RAILWAY_ENVIRONMENT}" -s "${PRODUCTION_RAILWAY_SERVICE}"
          railway variable set "CJ_COMMIT_SHA=${GITHUB_SHA}" --skip-deploys -e "${PRODUCTION_RAILWAY_ENVIRONMENT}" -s "${PRODUCTION_RAILWAY_SERVICE}"

      - name: Trigger Railway production deploy
        run: railway up --ci --detach -p "${RAILWAY_PROJECT_ID}" -e "${PRODUCTION_RAILWAY_ENVIRONMENT}" -s "${PRODUCTION_RAILWAY_SERVICE}" -m "${{ steps.deploy_message.outputs.value }}"

      - name: Wait for Railway production deployment success
        env:
          PREVIOUS_DEPLOYMENT_ID: ${{ steps.previous.outputs.value }}
          RAILWAY_ENVIRONMENT_NAME: production
          RAILWAY_SERVICE_NAME: mother-bear-court
          DEPLOY_TIMEOUT_SECONDS: '1200'
        run: bash scripts/wait-railway-deploy.sh

  verify-release:
    name: Verify Production Release
    needs:
      - preflight
      - deploy-web
      - deploy-backend
    if: ${{ always() && inputs.run_release_gate && needs.preflight.result == 'success' && (needs.deploy-web.result == 'success' || needs.deploy-web.result == 'skipped') && (needs.deploy-backend.result == 'success' || needs.deploy-backend.result == 'skipped') }}
    runs-on: ubuntu-latest
    environment: Production
    env:
      BACKEND_BASE_URL: ${{ vars.PRODUCTION_BACKEND_BASE_URL || secrets.PRODUCTION_BACKEND_BASE_URL }}
      MAIN_WEB_URL: ${{ vars.PRODUCTION_MAIN_WEB_URL || 'https://mother-bear-court.vercel.app' }}
      ADMIN_WEB_URL: ${{ vars.PRODUCTION_ADMIN_WEB_URL || 'https://frontend-admin-sigma-virid.vercel.app' }}
      DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL || secrets.APP_RELEASE_DATABASE_URL }}
      REDIS_URL: ${{ secrets.PRODUCTION_REDIS_URL }}
      ADMIN_JWT_EXPIRES_IN: ${{ secrets.PRODUCTION_ADMIN_JWT_EXPIRES_IN }}
      AI_COST_PRICING_JSON: ${{ secrets.PRODUCTION_AI_COST_PRICING_JSON || secrets.AI_COST_PRICING_JSON }}
      AI_COST_REQUIRED_MODELS: ${{ vars.PRODUCTION_AI_COST_REQUIRED_MODELS || vars.AI_COST_REQUIRED_MODELS }}
      RELEASE_SMOKE_ADMIN_EMAIL: ${{ secrets.RELEASE_SMOKE_ADMIN_EMAIL }}
      RELEASE_SMOKE_ADMIN_PASSWORD: ${{ secrets.RELEASE_SMOKE_ADMIN_PASSWORD }}
      RUN_MUTATING_RELEASE_SMOKE: 'true'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm --prefix backend ci

      - name: Validate release gate secrets
        run: |
          missing=0
          for key in BACKEND_BASE_URL DATABASE_URL REDIS_URL ADMIN_JWT_EXPIRES_IN AI_COST_PRICING_JSON RELEASE_SMOKE_ADMIN_EMAIL RELEASE_SMOKE_ADMIN_PASSWORD; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: ${key}"
              missing=1
            fi
          done
          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

      - name: Run release gate with evidence
        run: npm run ops:release:gate:evidence

      - name: Upload release gate evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: production-release-gate-evidence-${{ github.run_id }}
          path: temp/release-gate-evidence/**
          if-no-files-found: warn

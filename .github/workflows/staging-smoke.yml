name: Staging Smoke Gate

on:
  workflow_dispatch:
    inputs:
      origin:
        description: Optional Origin header override (defaults to frontend base URL)
        required: false
        type: string
  workflow_call:
    inputs:
      origin:
        description: Optional Origin header override (defaults to frontend base URL)
        required: false
        type: string
    secrets:
      STAGING_BACKEND_BASE_URL:
        required: true
      STAGING_FRONTEND_BASE_URL:
        required: true
      STAGING_ADMIN_EMAIL:
        required: true
      STAGING_ADMIN_PASSWORD:
        required: true
      STAGING_METRICS_TOKEN:
        required: true

jobs:
  staging-smoke:
    name: Staging Smoke
    runs-on: ubuntu-latest
    env:
      BACKEND_BASE_URL: ${{ secrets.STAGING_BACKEND_BASE_URL }}
      FRONTEND_BASE_URL: ${{ secrets.STAGING_FRONTEND_BASE_URL }}
      STAGING_ADMIN_EMAIL: ${{ secrets.STAGING_ADMIN_EMAIL }}
      STAGING_ADMIN_PASSWORD: ${{ secrets.STAGING_ADMIN_PASSWORD }}
      STAGING_METRICS_TOKEN: ${{ secrets.STAGING_METRICS_TOKEN }}
      ORIGIN: ${{ inputs.origin }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Validate staging secrets
        run: |
          missing=0
          for key in BACKEND_BASE_URL FRONTEND_BASE_URL STAGING_ADMIN_EMAIL STAGING_ADMIN_PASSWORD STAGING_METRICS_TOKEN; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: ${key}"
              missing=1
            fi
          done
          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

      - name: Run staging smoke gate
        run: npm run smoke:staging

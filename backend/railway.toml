# Railway 部署配置
# 用於自動化後端部署

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "npm start"
preDeployCommand = [
  "npm run ops:production:predeploy",
]
healthcheckPath = "/health/ready"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# 環境變量將在Railway Dashboard中配置
# 必需變量：
# - DATABASE_URL
# - JWT_SECRET
# - OPENAI_API_KEY
# - FRONTEND_URL
# - ALLOWED_ORIGINS
# - EMAIL_DELIVERY_MODE=smtp
# - EMAIL_FROM
# - EMAIL_OTP_PEPPER
# - SMTP_HOST
# - SMTP_PORT
# - SMTP_USER
# - SMTP_PASS
# - SMTP_SECURE / SMTP_REQUIRE_TLS

appId: com.emorapy.app
name: M4 case repair auth gate smoke
tags:
  - app
  - m4
  - smoke
---
- launchApp:
    clearState: true
- tapOn:
    text: Cancel
    optional: true
- assertVisible:
    id: public.home.screen
- tapOn:
    id: public.home.app
- assertVisible:
    id: case.auth-gate.screen
- tapOn:
    id: case.auth-gate.quick
- assertVisible:
    id: quick.screen
- openLink: emorapy://case
- tapOn:
    text: Open
    optional: true
- assertVisible:
    id: auth.screen
- assertVisible:
    id: auth.email.input
- openLink: emorapy://repair
- tapOn:
    text: Open
    optional: true
- assertVisible:
    id: auth.screen
- assertVisible:
    id: auth.email.input

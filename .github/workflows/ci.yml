# CI：Lint、單元測試、構建，維持七大原則/DevSecOps 審計合規
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  docs-guard:
    name: Docs Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install docs guard dependencies
        run: npm ci --ignore-scripts --workspaces=false

      - name: Check docs structure
        run: npm run docs:check
        timeout-minutes: 2

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        timeout-minutes: 2

      - name: Unit tests
        run: npm run test:unit
        env:
          NODE_ENV: test
          SKIP_DB_INIT: 'true'
          JWT_SECRET: test-secret-min-16-chars
          OPENAI_API_KEY: sk-dev-test-placeholder
          DATABASE_URL: file:./test.db

      - name: Admin integration tests
        run: npx jest tests/integration/admin-api-flow.test.ts --runInBand
        env:
          NODE_ENV: test
          SKIP_DB_INIT: 'true'
          JWT_SECRET: test-secret-min-16-chars
          OPENAI_API_KEY: sk-dev-test-placeholder
          DATABASE_URL: file:./test.db

      - name: Build
        run: npm run build

      - name: Audit (report only)
        run: npm audit --audit-level=high || true

  backend-quick-flow:
    name: Backend Quick Flow Integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: emorapy
          POSTGRES_PASSWORD: emorapy_dev_pass
          POSTGRES_DB: emorapy_flow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U emorapy -d emorapy_flow_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prepare flow test database
        env:
          DATABASE_URL: postgresql://emorapy:emorapy_dev_pass@127.0.0.1:5432/emorapy_flow_test
        run: npx prisma generate && npx prisma migrate deploy

      - name: Quick experience flow integration
        env:
          NODE_ENV: test
          RUN_FLOW_TESTS: 'true'
          TEST_DATABASE_URL: postgresql://emorapy:emorapy_dev_pass@127.0.0.1:5432/emorapy_flow_test
          DATABASE_URL: postgresql://emorapy:emorapy_dev_pass@127.0.0.1:5432/emorapy_flow_test
          SKIP_DB_INIT: 'true'
          JWT_SECRET: test-secret-min-32-chars-1234567890
          OPENAI_API_KEY: sk-dev-test-placeholder
          SUPPRESS_LOGS: 'true'
        run: npx jest tests/integration/quick-experience.flow.test.ts --runInBand

  production-like-smoke:
    name: Production-like Smoke
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: emorapy
          POSTGRES_PASSWORD: emorapy_dev_pass
          POSTGRES_DB: emorapy_smoke
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U emorapy -d emorapy_smoke"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node (backend)
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Prepare smoke database and seed admin users
        working-directory: backend
        env:
          DATABASE_URL: postgresql://emorapy:emorapy_dev_pass@127.0.0.1:5432/emorapy_smoke
          ADMIN_SEED_EMAIL: admin-smoke@example.com
          ADMIN_SEED_PASSWORD: AdminPass1234
          ADMIN_SEED_NAME: Admin Smoke
          LIMITED_ADMIN_SEED_EMAIL: support-smoke@example.com
          LIMITED_ADMIN_SEED_PASSWORD: SupportPass1234
          LIMITED_ADMIN_SEED_NAME: Support Smoke
          LIMITED_ADMIN_SEED_ROLE: support
        run: npx prisma generate && npx prisma migrate deploy && npm run prisma:seed

      - name: Build backend (production-like)
        working-directory: backend
        run: npm run build:prod

      - name: Start backend (production-like)
        working-directory: backend
        env:
          NODE_ENV: production
          PORT: 3001
          DATABASE_URL: postgresql://emorapy:emorapy_dev_pass@127.0.0.1:5432/emorapy_smoke
          JWT_SECRET: emorapyJwtProdKeyA9f7k2LmN3pQ4rS5tU6vW8xY1zB3cD
          JWT_EXPIRES_IN: 24h
          ADMIN_JWT_SECRET: emorapyAdminJwtKeyH8j3k4LmN5pQ6rS7tU9vW1xY2zB4cD
          ADMIN_JWT_EXPIRES_IN: 12h
          OPENAI_API_KEY: sk-prod-smoke-placeholder
          FRONTEND_URL: http://127.0.0.1:4173
          ALLOWED_ORIGINS: http://127.0.0.1:4173
          ALLOW_SIMPLE_LOCK: 'true'
          ENABLE_SCHEDULED_JOBS: 'false'
          METRICS_ENABLED: 'false'
        run: npm run start > ../backend-prod-smoke.log 2>&1 &

      - name: Wait for backend ready
        run: |
          for i in {1..45}; do
            if curl -sf "http://127.0.0.1:3001/health" >/dev/null; then
              echo "Backend ready"
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become ready"
          tail -n 200 backend-prod-smoke.log || true
          exit 1

      - name: Setup Node (frontend)
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        working-directory: .
        run: npm ci

      - name: Build frontend artifact
        working-directory: .
        env:
          VITE_API_BASE_URL: http://127.0.0.1:3001/api/v1
        run: npm run build --workspace frontend

      - name: Start frontend preview
        working-directory: .
        env:
          VITE_API_BASE_URL: http://127.0.0.1:3001/api/v1
        run: npm run preview --workspace frontend -- --host 127.0.0.1 --port 4173 > frontend-prod-smoke.log 2>&1 &

      - name: Wait for frontend preview ready
        run: |
          for i in {1..30}; do
            if curl -sf "http://127.0.0.1:4173/admin/login" >/dev/null; then
              echo "Frontend preview ready"
              exit 0
            fi
            sleep 2
          done
          echo "Frontend preview did not become ready"
          tail -n 200 frontend-prod-smoke.log || true
          exit 1

      - name: Run production-like smoke script
        env:
          BACKEND_BASE_URL: http://127.0.0.1:3001
          API_BASE_URL: http://127.0.0.1:3001/api/v1
          FRONTEND_BASE_URL: http://127.0.0.1:4173
          ORIGIN: http://127.0.0.1:4173
          ADMIN_EMAIL: admin-smoke@example.com
          ADMIN_PASSWORD: AdminPass1234
        run: bash scripts/smoke-production-like.sh

      - name: Dump production-like logs on failure
        if: failure()
        run: |
          echo "===== backend-prod-smoke.log (tail 200) ====="
          tail -n 200 backend-prod-smoke.log || true
          echo "===== frontend-prod-smoke.log (tail 200) ====="
          tail -n 200 frontend-prod-smoke.log || true

      - name: Upload production-like artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: production-like-smoke-report
          path: |
            backend-prod-smoke.log
            frontend-prod-smoke.log
          if-no-files-found: ignore

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        working-directory: .
        run: npm ci

      - name: Lint
        working-directory: .
        run: npm run lint --workspace frontend
        timeout-minutes: 2

      - name: Unit tests
        working-directory: .
        run: npm run test:run --workspace frontend

      - name: Build
        working-directory: .
        run: npm run build --workspace frontend

      - name: Audit (report only)
        working-directory: .
        run: npm audit --workspace frontend --audit-level=high || true

  frontend-admin:
    name: Frontend Admin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        working-directory: .
        run: npm ci

      - name: Lint
        working-directory: .
        run: npm run lint --workspace frontend-admin
        timeout-minutes: 2

      - name: Build
        working-directory: .
        run: npm run build --workspace frontend-admin

  admin-e2e:
    name: Admin E2E
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: emorapy
          POSTGRES_PASSWORD: emorapy_dev_pass
          POSTGRES_DB: emorapy_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U emorapy -d emorapy_dev"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node (backend)
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Prepare backend database and seed admin users
        working-directory: backend
        env:
          NODE_ENV: development
          PORT: 3001
          DATABASE_URL: postgresql://emorapy:emorapy_dev_pass@127.0.0.1:5432/emorapy_dev
          JWT_SECRET: test-secret-min-32-chars-1234567890
          OPENAI_API_KEY: sk-dev-test-placeholder
          FRONTEND_URL: http://127.0.0.1:5173
          ALLOWED_ORIGINS: http://127.0.0.1:5173
          ENABLE_SCHEDULED_JOBS: 'false'
          ADMIN_SEED_EMAIL: admin-e2e@example.com
          ADMIN_SEED_PASSWORD: AdminPass1234
          ADMIN_SEED_NAME: Admin E2E
          LIMITED_ADMIN_SEED_EMAIL: support-e2e@example.com
          LIMITED_ADMIN_SEED_PASSWORD: SupportPass1234
          LIMITED_ADMIN_SEED_NAME: Support E2E
          LIMITED_ADMIN_SEED_ROLE: support
        run: npx prisma db push --accept-data-loss && npm run prisma:seed

      - name: Start backend server
        working-directory: backend
        env:
          NODE_ENV: development
          PORT: 3001
          DATABASE_URL: postgresql://emorapy:emorapy_dev_pass@127.0.0.1:5432/emorapy_dev
          JWT_SECRET: test-secret-min-32-chars-1234567890
          OPENAI_API_KEY: sk-dev-test-placeholder
          FRONTEND_URL: http://127.0.0.1:5173
          ALLOWED_ORIGINS: http://127.0.0.1:5173
          ENABLE_SCHEDULED_JOBS: 'false'
        run: npm run dev > ../backend-e2e.log 2>&1 &

      - name: Wait for backend ready
        run: |
          for i in {1..30}; do
            if curl -sf "http://127.0.0.1:3001/health" >/dev/null; then
              echo "Backend ready"
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become ready"
          tail -n 200 backend-e2e.log || true
          exit 1

      - name: Setup Node (frontend)
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        working-directory: .
        run: npm ci

      - name: Start frontend server
        working-directory: .
        env:
          VITE_API_BASE_URL: http://127.0.0.1:3001/api/v1
        run: npm run dev --workspace frontend-admin -- --host 127.0.0.1 --port 5173 > frontend-e2e.log 2>&1 &

      - name: Wait for frontend ready
        run: |
          for i in {1..30}; do
            if curl -sf "http://127.0.0.1:5173/admin/login" >/dev/null; then
              echo "Frontend ready"
              exit 0
            fi
            sleep 2
          done
          echo "Frontend did not become ready"
          tail -n 200 frontend-e2e.log || true
          exit 1

      - name: Setup Node (e2e)
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json

      - name: Install e2e dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browser
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Run admin E2E
        working-directory: e2e
        run: npm test
        env:
          E2E_STRICT: 'true'
          E2E_BASE_URL: http://127.0.0.1:5173
          E2E_ADMIN_EMAIL: admin-e2e@example.com
          E2E_ADMIN_PASSWORD: AdminPass1234
          E2E_LIMITED_ADMIN_EMAIL: support-e2e@example.com
          E2E_LIMITED_ADMIN_PASSWORD: SupportPass1234

      - name: Dump service logs on failure
        if: failure()
        run: |
          echo "===== backend-e2e.log (tail 200) ====="
          tail -n 200 backend-e2e.log || true
          echo "===== frontend-e2e.log (tail 200) ====="
          tail -n 200 frontend-e2e.log || true

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: admin-e2e-report
          path: |
            e2e/playwright-report
            e2e/test-results
            backend-e2e.log
            frontend-e2e.log
          if-no-files-found: ignore

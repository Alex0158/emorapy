name: Staging Deploy and Smoke

on:
  workflow_dispatch:
    inputs:
      origin:
        description: Optional Origin header override (defaults to frontend base URL)
        required: false
        type: string
      deploy_message:
        description: Optional Railway deployment message
        required: false
        type: string

concurrency:
  group: staging-deploy-and-smoke
  cancel-in-progress: false

jobs:
  deploy-staging:
    name: Deploy Staging Backend
    runs-on: ubuntu-latest
    env:
      RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_API_TOKEN != '' && '' || secrets.RAILWAY_TOKEN }}
      STAGING_RAILWAY_PROJECT_ID: ${{ secrets.STAGING_RAILWAY_PROJECT_ID }}
      STAGING_RAILWAY_ENVIRONMENT: staging
      STAGING_RAILWAY_SERVICE: mother-bear-court
      DEPLOY_MESSAGE: ${{ inputs.deploy_message }}
    outputs:
      deploy_message: ${{ steps.deploy_message.outputs.value }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Validate deploy secrets
        run: |
          missing=0
          if [ -z "${RAILWAY_API_TOKEN}" ] && [ -z "${RAILWAY_TOKEN}" ]; then
            echo "Missing required secret: RAILWAY_API_TOKEN (or legacy RAILWAY_TOKEN)"
            missing=1
          fi
          for key in STAGING_RAILWAY_PROJECT_ID; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: ${key}"
              missing=1
            fi
          done
          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

      - name: Link staging backend
        run: railway link -p "${STAGING_RAILWAY_PROJECT_ID}" -e "${STAGING_RAILWAY_ENVIRONMENT}" -s "${STAGING_RAILWAY_SERVICE}"

      - name: Capture previous deployment
        id: previous
        run: |
          previous_deployment_id="$(
            railway status --json | jq -r \
              '.environments.edges[]
              | select(.node.name=="staging")
              | .node.serviceInstances.edges[]
              | select(.node.serviceName=="mother-bear-court")
              | (.node.latestDeployment.id // "")'
          )"
          echo "value=${previous_deployment_id}" >> "$GITHUB_OUTPUT"

      - name: Resolve deploy message
        id: deploy_message
        run: |
          if [ -n "${DEPLOY_MESSAGE}" ]; then
            message="${DEPLOY_MESSAGE}"
          else
            message="github staging deploy ${GITHUB_SHA}"
          fi
          echo "value=${message}" >> "$GITHUB_OUTPUT"

      - name: Trigger staging deploy
        run: railway up --ci --detach -p "${STAGING_RAILWAY_PROJECT_ID}" -e "${STAGING_RAILWAY_ENVIRONMENT}" -s "${STAGING_RAILWAY_SERVICE}" -m "${{ steps.deploy_message.outputs.value }}"

      - name: Wait for deployment success
        env:
          PREVIOUS_DEPLOYMENT_ID: ${{ steps.previous.outputs.value }}
          RAILWAY_ENVIRONMENT_NAME: staging
          RAILWAY_SERVICE_NAME: mother-bear-court
          DEPLOY_TIMEOUT_SECONDS: '1200'
        run: bash scripts/wait-railway-deploy.sh

  staging-smoke:
    name: Staging Smoke Gate
    needs: deploy-staging
    uses: ./.github/workflows/staging-smoke.yml
    with:
      origin: ${{ inputs.origin }}
    secrets: inherit
